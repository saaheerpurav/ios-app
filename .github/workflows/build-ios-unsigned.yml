name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx expo prebuild --platform ios --clean --non-interactive

      - working-directory: ios
        run: pod install

      - name: Build unsigned app
        run: |
          set -euo pipefail
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          APP_NAME="$(basename "$APP_PATH" .app)"
          rm -rf dist Payload
          mkdir -p Payload dist
          cp -R "$APP_PATH" "Payload/$APP_NAME.app"
          /usr/bin/zip -qry "dist/$APP_NAME-unsigned.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: dist/*.ipa
